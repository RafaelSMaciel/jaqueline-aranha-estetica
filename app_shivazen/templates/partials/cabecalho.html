{% load static %}
<header class="header-container fixed-top glass-card border-0 transition-base" style="border-radius: 0 0 20px 20px;"

    <div class="container d-flex align-items-center justify-content-between py-2">
        <div class="logo">
            <a href="{% url 'shivazen:inicio' %}" aria-label="Página inicial Shiva Zen">
                <img src="{% static 'assents/LogoSemFundo.png' %}" alt="Logo Shiva Zen" class="img-fluid header-logo">
            </a>
        </div>

        <nav class="d-none d-md-flex align-items-center" aria-label="Navegação principal">
            <ul class="navbar-nav d-flex flex-row align-items-center gap-4 mb-0">
                <li class="nav-item">
                    <a class="nav-link text-dark fw-bold" href="{% url 'shivazen:agendamento_publico' %}"
                        style="font-size: 0.9rem;"><i class="fas fa-calendar-alt me-1"></i>Agendar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-dark fw-bold" href="{% url 'shivazen:promocoes' %}"
                        style="font-size: 0.9rem;"><i class="fas fa-tag me-1"></i>Promoções</a>

                <li class="nav-item">
                    <a class="nav-link text-dark fw-bold" href="{% url 'shivazen:meus_agendamentos' %}"

                </li>
                <li class="nav-item">
                    <a class="btn btn-sm rounded-pill px-4 shadow-sm fw-bold"
                        href="https://wa.me/5500000000000" target="_blank"
                        style="background:#25D366;color:white;font-size:0.85rem;">
                        <i class="fab fa-whatsapp me-1"></i> WhatsApp
                    </a>
                </li>
            </ul>
        </nav>

        <button class="navbar-toggler d-md-none p-2 border-0 text-primary" type="button" data-bs-toggle="collapse"

            aria-label="Toggle navigation menu">
            <i class="fas fa-bars fs-3" aria-hidden="true"></i>
        </button>
    </div>

    <div class="collapse navbar-collapse d-md-none mobile-menu-container bg-white border-top" id="mobileMenu">
